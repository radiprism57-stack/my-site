<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Original Site</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    header {
      background: #4CAF50;
      color: white;
      padding: 20px;
      text-align: center;
    }
    nav {
      background: #333;
      padding: 10px;
      text-align: center;
    }
    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }
    nav a:hover {
      text-decoration: underline;
    }
    .container {
      padding: 20px;
    }
    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    iframe {
      width: 100%;
      max-width: 560px;
      height: 315px;
      border: none;
      margin-top: 10px;
    }
    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>ようこそ！</h1>
  <p>陰ディスパーティーへ</p>
</header>

<nav>
  <a href="#home">ホーム</a>
  <a href="#about">プロフィール</a>
  <a href="#contact">お問い合わせ</a>
</nav>

<div class="container">
  <div class="card" id="home">
    <h2>ホーム</h2>
    <p>陰キャディスコのホームページです。</p>
  </div>

  <div class="card" id="about">
    <h2>プロフィール</h2>
    <p>2020年に活動を開始</p>
  </div>

  <div class="card" id="contact">
    <h2>お問い合わせ</h2>

    <p>Twitterはこちら👇</p>
    <a href="https://twitter.com/あなたのID" target="_blank">Twitterを見る</a>

    <h3>最新ツイート</h3>
    <a class="twitter-timeline" href="https://twitter.com/あなたのID">Tweets by Twitter</a>
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>

    <h2>YouTube</h2>
    <p>チャンネルはこちら👇</p>
    <a href="https://www.youtube.com/@inkya_disco" target="_blank">YouTubeチャンネルを見る</a>

    <h3>おすすめ動画</h3>
    <!-- 動画1（指定された動画） -->
    <iframe src="https://www.youtube.com/embed/16O_Cu1lRtw" allowfullscreen></iframe>

    <!-- 動画2（自由に追加OK） -->
    <iframe src="https://www.youtube.com/embed/Xm8hfiIKLyg" allowfullscreen></iframe>

  </div>
</div>

<footer>
  <p>© 2026 My Original Site</p>
</footer>

</body>
</html>
