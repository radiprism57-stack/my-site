<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>陰ディスパーティー | ホーム</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }
    header {
      background: url("陰ディス.png") no-repeat center center/cover;
      padding: 60px 20px;
      text-align: center;
    }
    nav {
      background: #333;
      padding: 10px;
      text-align: center;
    }
    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }
    nav a:hover {
      text-decoration: underline;
    }
    .container {
      padding: 20px;
    }
    .card {
      background: rgba(0,0,0,0.6);
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    /* 動画横並び */
    .video-grid {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    .video-item {
      flex: 1 1 300px;
    }
    .video-item iframe {
      width: 100%;
      height: 315px;
      border: none;
    }
    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>陰ディスパーティー</h1>
</header>

<nav>
  <a href="index.html">ホーム</a>
  <a href="about.html">プロフィール</a>
  <a href="contact.html">お問い合わせ</a>
</nav>

<div class="container">
  <div class="card">
    <h2>ホーム</h2>
    <p>陰キャディスコの公式サイトへようこそ！</p>
  </div>

  <div class="card">
    <h2>Twitter</h2>
    <p>最新ツイートはこちら👇</p>
    <a href="https://twitter.com/inkya_disco" target="_blank">Twitterを見る</a>

    <!-- Twitter埋め込み（確実に表示される方法） -->
    <blockquote class="twitter-tweet">
      <a href="https://twitter.com/inkya_disco"></a>
    </blockquote>
    <p>
      ※表示されない場合はこちら👉 
      <a href="https://twitter.com/inkya_disco" target="_blank">Twitterを見る</a>
    </p>
    </div>

  <div class="card">
    <h2>YouTube</h2>
    <p>おすすめ動画👇</p>

    <div class="video-grid">
      <!-- 動画1 -->
      <div class="video-item">
        <iframe src="https://www.youtube-nocookie.com/embed/16O_Cu1lRtw"
          title="YouTube video"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>

      <!-- 動画2（IDを差し替え） -->
      <div class="video-item">
        <iframe src="https://www.youtube-nocookie.com/embed/D8elLtfUgrM"
          title="YouTube video"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>
    </div>
  </div>

</div>

<footer>
  <p>© 2026 My Original Site</p>
</footer>

</body>
</html>
